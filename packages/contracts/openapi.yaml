        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub webhook event payload
      responses:
        "200":
          description: OK
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token

  parameters:
    tenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: 操作対象のテナント（JWT claims と一致必須）
    tenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    xDataClassificationHeader:
      name: X-Data-Classification
      in: header
      required: false
      schema:
        type: string
        enum: [public, internal, confidential, restricted]
        default: restricted
      description: |
        データ分類ヘッダー。未指定または不正値は `restricted` として扱う（fail-closed）。
    caseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    estimateId:
      name: estimateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    proposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    repositoryId:
      name: repositoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Too Many Requests
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    NDJSONContentChunk:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [content]
        content:
          type: string
        data_classification:
          type: string
          enum: [public, internal, confidential, restricted]
    NDJSONErrorChunk:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          type: string
        data_classification:
          type: string
          enum: [public, internal, confidential, restricted]
    NDJSONDoneChunk:
      type: object
      required: [type, done]
      properties:
        type:
          type: string
          enum: [done]
        done:
          type: boolean
        event_type:
          type: string
          enum: [conversation.turn.completed]
        data_classification:
          type: string
          enum: [public, internal, confidential, restricted]
    NDJSONStreamChunk:
      oneOf:
        - $ref: "#/components/schemas/NDJSONContentChunk"
        - $ref: "#/components/schemas/NDJSONErrorChunk"
        - $ref: "#/components/schemas/NDJSONDoneChunk"

    # ─── Error ───
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object

    # ─── Health ───
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        checks:
          type: object
          properties:
            database:
              type: boolean
            firebase_auth:
              type: boolean
            llm_gateway:
              type: boolean

    # ─── Tenant ───
    Tenant:
      type: object
      required: [id, name, slug, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]
        settings:
          type: object
        analytics_opt_in:
          type: boolean
          default: false
          description: Cross-tenant anonymous intelligence への参加同意（ADR-0012）
        training_opt_in:
          type: boolean
          default: false
          description: 学習データとしての利用同意（ADR-0013）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTenantRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"

    UpdateTenantSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        analytics_opt_in:
          type: boolean
          description: Cross-tenant anonymous intelligence への参加同意（ADR-0012）
        training_opt_in:
          type: boolean
          description: 学習データとしての利用同意（ADR-0013）
        settings:
          type: object
          description: テナント固有設定

    TenantMember:
      type: object
      required: [id, tenant_id, firebase_uid, role]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        firebase_uid:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [owner, admin, manager, member, viewer]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    AddTenantMemberRequest:
      type: object
      required: [firebase_uid, role]
      properties:
        firebase_uid:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [owner, admin, manager, member, viewer]

    # ─── Case ───
    CaseType:
      type: string
      enum: [new_project, bug_report, fix_request, feature_addition, undetermined]

    CaseStatus:
      type: string
      enum: [draft, interviewing, analyzing, estimating, proposed, approved, rejected, on_hold]

    Case:
      type: object
      required: [id, tenant_id, title, type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        title:
          type: string
        type:
          $ref: "#/components/schemas/CaseType"
        status:
          $ref: "#/components/schemas/CaseStatus"
        priority:
          type: string
          enum: [low, medium, high, critical]
        business_line:
          type: string
        existing_system_url:
          type: string
          format: uri
        spec_markdown:
          type: string
        created_by_uid:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CaseWithDetails:
      allOf:
        - $ref: "#/components/schemas/Case"
        - type: object
          properties:
            conversations:
              type: array
              items:
                $ref: "#/components/schemas/ConversationTurn"
            source_documents:
              type: array
              items:
                $ref: "#/components/schemas/SourceDocument"
            estimates:
              type: array
              items:
                $ref: "#/components/schemas/Estimate"

    CreateCaseRequest:
      type: object
      required: [title, type]
      properties:
        title:
          type: string
          maxLength: 200
        type:
          $ref: "#/components/schemas/CaseType"
        existing_system_url:
          type: string
          format: uri
        company_name:
          type: string
        contact_name:
          type: string
        contact_email:
          type: string
          format: email

    UpdateCaseRequest:
      type: object
      properties:
        title:
          type: string
        type:
          $ref: "#/components/schemas/CaseType"
        status:
          $ref: "#/components/schemas/CaseStatus"
        priority:
          type: string
          enum: [low, medium, high, critical]

    # ─── Conversation ───
    ConversationTurn:
      type: object
      required: [id, case_id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        metadata:
          type: object
          properties:
            category:
              type: string
            confidence_score:
              type: number
            is_complete:
              type: boolean
            question_type:
              type: string
              enum: [open, choice, confirmation]
            choices:
              type: array
              items:
                type: string
        created_at:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 10000

    # ─── Source Document ───
    SourceDocument:
      type: object
      required: [id, case_id, file_name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        file_name:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
        source_kind:
          type: string
          enum: [file_upload, repository_url, website_url]
        source_url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, processing, completed, failed]
        gcs_path:
          type: string
        analysis_result:
          type: object
        created_at:
          type: string
          format: date-time

    # ─── Requirement Artifact ───
    RequirementArtifact:
      type: object
      required: [id, case_id, version, markdown, status]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        version:
          type: integer
        markdown:
          type: string
        source_chunks:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [draft, finalized]
        created_by_uid:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ─── Repository ───
    RepositorySnapshot:
      type: object
      required: [id, tenant_id, full_name]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        org_name:
          type: string
        repo_name:
          type: string
        full_name:
          type: string
        description:
          type: string
        language:
          type: string
        stars:
          type: integer
        topics:
          type: array
          items:
            type: string
        tech_stack:
          type: array
          items:
            type: string
        total_commits:
          type: integer
        contributor_count:
          type: integer
        velocity_metric:
          $ref: "#/components/schemas/VelocityMetric"
        synced_at:
          type: string
          format: date-time

    VelocityMetric:
      type: object
      required: [velocity_score, analyzed_at]
      properties:
        commits_per_week:
          type: number
        active_days_per_week:
          type: number
        churn_rate:
          type: number
        velocity_score:
          type: number
        estimated_hours:
          type: number
        analyzed_at:
          type: string
          format: date-time

    SimilarityResult:
      type: object
      properties:
        repository:
          $ref: "#/components/schemas/RepositorySnapshot"
        similarity_score:
          type: number
          minimum: 0
          maximum: 1
        estimated_hours:
          type: number

    # ─── Market Evidence ───
    CollectMarketEvidenceRequest:
      type: object
      required: [case_type, context]
      properties:
        case_id:
          type: string
          format: uuid
        case_type:
          $ref: "#/components/schemas/CaseType"
        context:
          type: string
          description: プロジェクトの概要説明
        region:
          type: string
          default: japan
        providers:
          type: array
          items:
            type: string
            enum: [grok, brave, perplexity, gemini]
          description: 使用するプロバイダ（省略時は全プロバイダ）

    EvidenceFragment:
      type: object
      properties:
        provider:
          type: string
          enum: [grok, brave, perplexity, gemini]
        hourly_rate_range:
          $ref: "#/components/schemas/Range"
        total_hours_range:
          $ref: "#/components/schemas/Range"
        team_size_range:
          $ref: "#/components/schemas/Range"
        duration_range:
          $ref: "#/components/schemas/Range"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        provider_confidence:
          type: number
          minimum: 0
          maximum: 1
        raw_response:
          type: string
          writeOnly: true
          description: プロバイダー生レスポンス（Restricted; 内部利用のみ）
        retrieved_at:
          type: string
          format: date-time

    AggregatedEvidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fragments:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceFragment"
        consensus_hours_range:
          $ref: "#/components/schemas/Range"
        consensus_rate_range:
          $ref: "#/components/schemas/Range"
        overall_confidence:
          type: string
          enum: [high, medium, low]
        contradictions:
          type: array
          items:
            type: object
            properties:
              provider_a:
                type: string
              provider_b:
                type: string
              field:
                type: string
              description:
                type: string
        requires_human_review:
          type: boolean
        aggregated_at:
          type: string
          format: date-time

    Range:
      type: object
      properties:
        min:
          type: number
        max:
          type: number

    Citation:
      type: object
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        source_authority:
          type: string
          enum: [official, industry, community, unknown]
        snippet:
          type: string

    # ─── Estimate ───
    Estimate:
      type: object
      required: [id, case_id, estimate_mode, status]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        estimate_mode:
          type: string
          enum: [market_comparison, hours_only, hybrid]
        status:
          type: string
          enum: [draft, ready, approved, rejected]
        your_hourly_rate:
          type: number
        your_estimated_hours:
          type: number
        total_your_cost:
          type: number
        hours_investigation:
          type: number
        hours_implementation:
          type: number
        hours_testing:
          type: number
        hours_buffer:
          type: number
        market_hourly_rate:
          type: number
        market_estimated_hours:
          type: number
        total_market_cost:
          type: number
        aggregated_evidence_id:
          type: string
          format: uuid
        calibration_ratio:
          type: number
          description: BigQuery 実績補正係数
        risk_flags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    EstimateWithProposal:
      allOf:
        - $ref: "#/components/schemas/Estimate"
        - type: object
          properties:
            three_way_proposal:
              $ref: "#/components/schemas/ThreeWayProposal"
            go_no_go:
              $ref: "#/components/schemas/GoNoGoResult"

    CreateEstimateRequest:
      type: object
      required: [your_hourly_rate]
      properties:
        your_hourly_rate:
          type: number
          minimum: 0
        region:
          type: string
          default: japan
        include_market_evidence:
          type: boolean
          default: true

    ThreeWayProposal:
      type: object
      description: 自社実績 vs 市場相場 vs 当社提案の 3 軸比較
      properties:
        our_track_record:
          type: object
          description: 自社実績軸
          properties:
            similar_projects:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  actual_hours:
                    type: number
                  similarity_score:
                    type: number
            median_hours:
              type: number
            velocity_score:
              type: number
        market_benchmark:
          type: object
          description: 市場相場軸
          properties:
            consensus_hours:
              $ref: "#/components/schemas/Range"
            consensus_rate:
              $ref: "#/components/schemas/Range"
            confidence:
              type: string
              enum: [high, medium, low]
            provider_count:
              type: integer
            citations:
              type: array
              items:
                $ref: "#/components/schemas/Citation"
        our_proposal:
          type: object
          description: 当社提案軸
          properties:
            proposed_hours:
              type: number
            proposed_rate:
              type: number
            proposed_total:
              type: number
            savings_vs_market_percent:
              type: number
            competitive_advantages:
              type: array
              items:
                type: string
            calibration_note:
              type: string
              description: BigQuery 実績補正の説明

    # ─── Proposal & Approval ───
    ProposalSession:
      type: object
      required: [id, case_id, estimate_id, status]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        estimate_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, presented, approved, rejected, expired]
        presented_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateProposalRequest:
      type: object
      required: [estimate_id]
      properties:
        estimate_id:
          type: string
          format: uuid

    ApprovalDecision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        proposal_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approved, rejected]
        decided_by_uid:
          type: string
        comment:
          type: string
        decided_at:
          type: string
          format: date-time

    GoNoGoResult:
      type: object
      properties:
        decision:
          type: string
          enum: [go, go_with_conditions, no_go]
        scores:
          type: object
          properties:
            profitability:
              type: number
            strategic_alignment:
              type: number
            capacity:
              type: number
            technical_risk:
              type: number
        weights:
          type: object
          description: 各評価軸の重み（bug/fix は profitability=0）
          properties:
            profitability:
              type: number
            strategic_alignment:
              type: number
            capacity:
              type: number
            technical_risk:
              type: number
        reasoning:
          type: string

    # ─── Handoff ───
    CreateHandoffRequest:
      type: object
      required: [estimate_id, idempotency_key]
      properties:
        estimate_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
          format: uuid
          description: 外部副作用を伴う handoff 実行の冪等性キー

    HandoffPackage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        estimate_id:
          type: string
          format: uuid
        linear_project_id:
          type: string
        linear_project_url:
          type: string
          format: uri
        github_project_url:
          type: string
          format: uri
        linear_issues:
          type: array
          items:
            type: object
            properties:
              module_name:
                type: string
              linear_issue_id:
                type: string
              linear_issue_url:
                type: string
                format: uri
              github_issue_url:
                type: string
                format: uri
        status:
          type: string
          enum: [pending, syncing, synced, error]
        created_at:
          type: string
          format: date-time

    ClassifyChangeRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
        requirement_artifact_id:
          type: string
          format: uuid
          description: 基準となる要件定義書

    ChangeClassification:
      type: object
      properties:
        classification:
          type: string
          enum: [bug_fix, additional_scope]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reasoning:
          type: string
        matched_requirement_sections:
          type: array
          items:
            type: string
        is_billable:
          type: boolean

    # ─── Operational Intelligence ───
    AccuracyReport:
      type: object
      properties:
        period:
          type: string
        total_estimates:
          type: integer
        completed_projects:
          type: integer
        mean_deviation_percent:
          type: number
        median_deviation_percent:
          type: number
        by_case_type:
          type: object
          additionalProperties:
            type: object
            properties:
              count:
                type: integer
              mean_deviation:
                type: number
        by_provider:
          type: object
          additionalProperties:
            type: object
            properties:
              citation_count:
                type: integer
              mean_deviation:
                type: number

    CustomerPortfolioEntry:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        customer_name:
          type: string
        total_cases:
          type: integer
        total_hours:
          type: number
        total_revenue:
          type: number
        estimation_accuracy_percent:
          type: number
        bug_rate:
          type: number
        additional_scope_rate:
          type: number
        ltv_estimate:
          type: number
        health:
          type: string
          enum: [healthy, warning, at_risk]

    CapacityForecast:
      type: object
      properties:
        current_velocity:
          type: number
        active_cases:
          type: integer
        committed_hours:
          type: number
        available_hours_next_30d:
          type: number
        can_accept_new_case:
          type: boolean
        recommendation:
          type: string

    ProjectOutcome:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        actual_hours:
          type: number
        actual_cost:
          type: number
        deviation_percent:
          type: number
        notes:
          type: string
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    PricingRecommendation:
      type: object
      properties:
        case_type:
          $ref: "#/components/schemas/CaseType"
        current_coefficient:
          type: number
        recommended_coefficient:
          type: number
        reasoning:
          type: string
        based_on_outcomes:
          type: integer
          description: 推奨の根拠となったプロジェクト数

    # ─── Admin ───
    PricingPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_type:
          $ref: "#/components/schemas/CaseType"
        name:
          type: string
        coefficient_min:
          type: number
        coefficient_max:
          type: number
        default_coefficient:
          type: number
        minimum_project_fee:
          type: number
        minimum_margin_percent:
          type: number
        active:
          type: boolean

    CreatePricingPolicyRequest:
      type: object
      required: [case_type, name, coefficient_min, coefficient_max, default_coefficient]
      properties:
        case_type:
          $ref: "#/components/schemas/CaseType"
        name:
          type: string
        coefficient_min:
          type: number
        coefficient_max:
          type: number
        default_coefficient:
          type: number
        minimum_project_fee:
          type: number
          default: 0
        minimum_margin_percent:
          type: number
          default: 20

    DataSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_key:
          type: string
        provider:
          type: string
        display_name:
          type: string
        trust_level:
          type: integer
          minimum: 1
          maximum: 5
        active:
          type: boolean
