  # ─── Webhooks (inbound) ───
  /v1/webhooks/linear:
    post:
      operationId: receiveLinearWebhook
      tags: [handoffs]
      security: []
      summary: Linear Webhook 受信
      description: HMAC-SHA256 署名検証
      parameters:
        - name: X-Linear-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 署名
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Linear webhook event payload
      responses:
        "200":
          description: OK
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/webhooks/github:
    post:
      operationId: receiveGitHubWebhook
      tags: [handoffs]
      security: []
      summary: GitHub Webhook 受信
      description: HMAC-SHA256 署名検証
      parameters:
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 署名
