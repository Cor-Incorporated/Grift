openapi: 3.1.0
info:
  title: Grift v2 API
  version: 2.0.0
  description: |
    受託開発会社の上流工程を AI で支援する業務基盤。
    7 つの Bounded Context に対応する REST API を提供する。

    認証: Firebase Auth ID Token (Bearer)
    テナント分離: JWT + X-Tenant-ID ヘッダーで操作対象テナントを指定

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.staging.benevolentdirector.app
    description: Staging
  - url: https://api.benevolentdirector.app
    description: Production

security:
  - bearerAuth: []

tags:
  - name: health
    description: ヘルスチェック（認証不要）
  - name: tenants
    description: テナント管理
  - name: cases
    description: "Intake Context: 案件管理"
  - name: conversations
    description: "Intake Context: AI ヒアリング"
  - name: source-documents
    description: "Intake Context: 資料取り込み"
  - name: repositories
    description: "Repository Intelligence Context: GitHub 連携"
  - name: velocity
    description: "Repository Intelligence Context: Velocity Metric"
  - name: market-evidence
    description: "Market Benchmark Context: 市場調査"
  - name: estimates
    description: "Estimation Context: 見積・Three-Way Proposal"
  - name: proposals
    description: "Proposal & Approval Context: 提案・承認"
  - name: handoffs
    description: "Handoff Context: Linear / GitHub 引き継ぎ"
  - name: operational
    description: "Operational Intelligence Context: 分析・フィードバック"
  - name: admin
    description: テナント管理者向け設定

paths:
  # ─── Health ───
  /health:
    get:
      operationId: getHealth
      tags: [health]
      security: []
      summary: ヘルスチェック
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ─── Tenants ───
  /v1/tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: テナント一覧（システム管理者用）
      x-required-roles: [system_admin]
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: テナント作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/tenants/{tenantId}/settings:
    patch:
      operationId: updateTenantSettings
      tags: [admin]
      summary: テナント設定更新（opt-in 含む）
      description: |
        テナント管理者がテナント設定を更新する。
        analytics_opt_in / training_opt_in の変更はこのエンドポイントで行う（ADR-0012, ADR-0013）。
      x-required-roles: [tenant_admin]
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/tenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantSettingsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/tenants/{tenantId}/members:
    get:
      operationId: listTenantMembers
      tags: [tenants]
      summary: テナントメンバー一覧
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/tenantId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantMember"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: addTenantMember
      tags: [tenants]
      summary: テナントメンバー追加
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/tenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTenantMemberRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TenantMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Cases (Intake Context) ───
  /v1/cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: 案件一覧
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CaseStatus"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/CaseType"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Case"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createCase
      tags: [cases]
      summary: 案件作成
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Case"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/cases/{caseId}:
    get:
      operationId: getCase
      tags: [cases]
      summary: 案件詳細
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CaseWithDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: 案件更新
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Case"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: 案件削除
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Conversations (Intake Context) ───
  /v1/cases/{caseId}/conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: 会話履歴取得
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationTurn"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: メッセージ送信（AI 応答を返す）
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ConversationTurn"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/cases/{caseId}/conversations/stream:
    post:
      operationId: streamConversation
      tags: [conversations]
      summary: NDJSON ストリーミング会話
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/xDataClassificationHeader"
        - $ref: "#/components/parameters/caseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: NDJSON stream (`content` / `error` / `done`)
          content:
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/NDJSONStreamChunk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Source Documents (Intake Context) ───
  /v1/cases/{caseId}/source-documents:
    get:
      operationId: listSourceDocuments
      tags: [source-documents]
      summary: 資料一覧
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SourceDocument"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: uploadSourceDocument
      tags: [source-documents]
      summary: 資料アップロード（PDF / ZIP / URL）
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                source_url:
                  type: string
                  format: uri
      responses:
        "202":
          description: Accepted (ingestion job queued)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SourceDocument"
                  job_id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Requirement Artifact (Estimation Context) ───
  /v1/cases/{caseId}/requirement-artifact:
    get:
      operationId: getRequirementArtifact
      tags: [estimates]
      summary: 要件アーティファクト取得
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RequirementArtifact"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Repositories (Repository Intelligence Context) ───
  /v1/repositories:
    get:
      operationId: listRepositories
      tags: [repositories]
      summary: リポジトリ一覧
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - name: org
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RepositorySnapshot"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/repositories/{repositoryId}:
    get:
      operationId: getRepository
      tags: [repositories]
      summary: リポジトリ詳細
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/repositoryId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RepositorySnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/repositories/{repositoryId}/velocity:
    get:
      operationId: getRepositoryVelocity
      tags: [velocity]
      summary: Velocity Metric 取得
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/repositoryId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/VelocityMetric"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/repositories/discover:
    post:
      operationId: discoverRepositories
      tags: [repositories]
      summary: GitHub App 経由でリポジトリ発見
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_names:
                  type: array
                  items:
                    type: string
      responses:
        "202":
          description: Accepted (discovery job queued)
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/velocity/similar:
    get:
      operationId: findSimilarProjects
      tags: [velocity]
      summary: 類似案件検索（pgvector）
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - name: description
          in: query
          required: true
          schema:
            type: string
        - name: top_k
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SimilarityResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Market Evidence (Market Benchmark Context) ───
  /v1/market-evidence:
    post:
      operationId: collectMarketEvidence
      tags: [market-evidence]
      summary: マルチプロバイダ市場調査を実行
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectMarketEvidenceRequest"
      responses:
        "202":
          description: Accepted (collection job queued)
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/market-evidence/{evidenceId}:
    get:
      operationId: getMarketEvidence
      tags: [market-evidence]
      summary: 市場エビデンス詳細
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AggregatedEvidence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─── Estimates (Estimation Context) ───
  /v1/cases/{caseId}/estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: 見積一覧
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Estimate"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createEstimate
      tags: [estimates]
      summary: 見積作成
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEstimateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Estimate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/cases/{caseId}/estimates/{estimateId}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: 見積詳細
      parameters:
        - $ref: "#/components/parameters/tenantIdHeader"
        - $ref: "#/components/parameters/caseId"
        - $ref: "#/components/parameters/estimateId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/EstimateWithProposal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/cases/{caseId}/estimates/{estimateId}/three-way-proposal:
    get:
      operationId: getThreeWayProposal
      tags: [estimates]
      summary: Three-Way Proposal 取得
      parameters:
