# v2 Quality Gate Pipeline
# Validates all v2 services: contracts, Go API, Python workers, React web
# Dependency graph: contracts -> {go-check, python-check, web-check} -> v2-quality-gate
name: v2 Quality Gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: v2-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Stage 1: Contract-first validation (no service deps)
  # ------------------------------------------------------------------
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: OpenAPI spec validation
        run: npm run ci:v2:openapi

      - name: SQL schema checks
        run: npm run ci:v2:schema

      - name: Monorepo structure check
        run: npm run ci:v2:monorepo

      - name: ADR consistency check
        run: npm run ci:v2:adr

      - name: Migration file validation
        run: npm run ci:v2:migration

  # ------------------------------------------------------------------
  # Stage 2a: Go control-api checks
  # ------------------------------------------------------------------
  go-check:
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/control-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/control-api

      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload Go coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: services/control-api/coverage.out
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # Stage 2b: Python service checks (llm-gateway + intelligence-worker)
  # ------------------------------------------------------------------
  python-check:
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - llm-gateway
          - intelligence-worker
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.6.x'
        continue-on-error: true

      - name: Fallback install uv via pip
        if: steps.setup-uv.outcome == 'failure'
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uvx ruff check src/ tests/

      - name: Ruff format check
        run: uvx ruff format --check src/ tests/

      - name: Type check with mypy
        run: uvx mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: uv run pytest tests/ -v

  # ------------------------------------------------------------------
  # Stage 2c: React web checks
  # ------------------------------------------------------------------
  web-check:
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --frozen-lockfile 2>/dev/null || npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npx vitest run

  # ------------------------------------------------------------------
  # Stage 3: Quality gate (all checks must pass)
  # ------------------------------------------------------------------
  v2-quality-gate:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - contracts
      - go-check
      - python-check
      - web-check
    timeout-minutes: 5
    steps:
      - name: Validate all v2 checks passed
        env:
          CONTRACTS_RESULT: ${{ needs.contracts.result }}
          GO_CHECK_RESULT: ${{ needs.go-check.result }}
          PYTHON_CHECK_RESULT: ${{ needs.python-check.result }}
          WEB_CHECK_RESULT: ${{ needs.web-check.result }}
        run: |
          set -euo pipefail

          checks=(
            CONTRACTS_RESULT
            GO_CHECK_RESULT
            PYTHON_CHECK_RESULT
            WEB_CHECK_RESULT
          )

          failed=0
          for check_name in "${checks[@]}"; do
            check_result="${!check_name}"
            if [ "$check_result" != "success" ]; then
              echo "::error::Required check failed: ${check_name}=${check_result}"
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::v2 quality gate failed. One or more checks did not pass."
            exit 1
          fi

          echo "All v2 quality gate checks passed."
