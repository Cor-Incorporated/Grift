# v2 Pre-merge Checks
# Runs on PRs targeting main only. Validates Docker builds and integration readiness.
name: v2 Pre-merge

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: v2-pre-merge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Docker build validation for all v2 services
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: control-api
            context: services/control-api
          - service: llm-gateway
            context: services/llm-gateway
          - service: intelligence-worker
            context: services/intelligence-worker
          - service: web
            context: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: benevolent-director/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  # ------------------------------------------------------------------
  # Pre-merge gate
  # ------------------------------------------------------------------
  v2-pre-merge-gate:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - docker-build
    timeout-minutes: 5
    steps:
      - name: Validate pre-merge checks
        env:
          DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
        run: |
          set -euo pipefail

          if [ "$DOCKER_BUILD_RESULT" != "success" ]; then
            echo "::error::Docker build failed: ${DOCKER_BUILD_RESULT}"
            exit 1
          fi

          echo "All v2 pre-merge checks passed."
