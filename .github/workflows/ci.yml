name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration files
        run: npm run ci:migrations

  v2-openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate v2 OpenAPI contract
        run: npm run ci:v2:openapi

  v2-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate v2 schema guardrails
        run: npm run ci:v2:schema

  v2-monorepo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate v2 monorepo scaffold
        run: npm run ci:v2:monorepo

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Clerk keys
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set. Add it in GitHub Secrets."
            exit 1
          fi
          if [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "CLERK_SECRET_KEY is not set. Add it in GitHub Secrets."
            exit 1
          fi
          if [[ "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" == "pk_test_ci_dummy" ]]; then
            echo "Invalid Clerk publishable key detected."
            exit 1
          fi

      - name: Production build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Clerk keys
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set. Add it in GitHub Secrets."
            exit 1
          fi
          if [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "CLERK_SECRET_KEY is not set. Add it in GitHub Secrets."
            exit 1
          fi
          if [[ "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" == "pk_test_ci_dummy" ]]; then
            echo "Invalid Clerk publishable key detected."
            exit 1
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  dependency-review:
    if: ${{ github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true' && vars.DEPENDENCY_REVIEW_SUPPORTED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  quality-gate:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - lint
      - type-check
      - unit-tests
      - migration-check
      - v2-openapi
      - v2-schema
      - v2-monorepo
      - build
      - e2e-smoke
      - dependency-review
    steps:
      - name: Validate required checks
        env:
          ENABLE_DEPENDENCY_REVIEW: ${{ vars.ENABLE_DEPENDENCY_REVIEW }}
          DEPENDENCY_REVIEW_SUPPORTED: ${{ vars.DEPENDENCY_REVIEW_SUPPORTED }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_CHECK_RESULT: ${{ needs.type-check.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          MIGRATION_CHECK_RESULT: ${{ needs.migration-check.result }}
          V2_OPENAPI_RESULT: ${{ needs.v2-openapi.result }}
          V2_SCHEMA_RESULT: ${{ needs.v2-schema.result }}
          V2_MONOREPO_RESULT: ${{ needs.v2-monorepo.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          E2E_SMOKE_RESULT: ${{ needs.e2e-smoke.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          set -euo pipefail

          core_checks=(
            LINT_RESULT
            TYPE_CHECK_RESULT
            UNIT_TESTS_RESULT
            MIGRATION_CHECK_RESULT
            V2_OPENAPI_RESULT
            V2_SCHEMA_RESULT
            V2_MONOREPO_RESULT
            BUILD_RESULT
            E2E_SMOKE_RESULT
          )

          for check_name in "${core_checks[@]}"; do
            check_result="${!check_name}"
            if [ "$check_result" != "success" ]; then
              echo "Required check failed: ${check_name}=${check_result}"
              exit 1
            fi
          done

          if [ "${ENABLE_DEPENDENCY_REVIEW}" = "true" ] && [ "${DEPENDENCY_REVIEW_SUPPORTED}" = "true" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "success" ]; then
            echo "Dependency review is enabled, but check did not succeed: ${DEPENDENCY_REVIEW_RESULT}"
            exit 1
          fi

          if [ "${ENABLE_DEPENDENCY_REVIEW}" != "true" ] && [ "${DEPENDENCY_REVIEW_RESULT}" = "failure" ]; then
            echo "Dependency review failed unexpectedly while feature is disabled."
            exit 1
          fi

          if [ "${ENABLE_DEPENDENCY_REVIEW}" = "true" ] && [ "${DEPENDENCY_REVIEW_SUPPORTED}" != "true" ]; then
            echo "Dependency review requested, but repository support flag is disabled."
            echo "Set DEPENDENCY_REVIEW_SUPPORTED=true after enabling Dependency Graph and GHAS."
          fi

          echo "All required CI quality gates passed."
