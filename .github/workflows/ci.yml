name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── v1 jobs (Next.js, runs from v1/) ───

  v1-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  v1-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  v1-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-coverage
          path: v1/coverage
          if-no-files-found: ignore

  v1-migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate migration files
        run: npm run ci:migrations

  v1-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: v1
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Clerk keys
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set."
            exit 1
          fi
          if [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "CLERK_SECRET_KEY is not set."
            exit 1
          fi
          if [[ "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" == "pk_test_ci_dummy" ]]; then
            echo "Invalid Clerk publishable key detected."
            exit 1
          fi

      - name: Production build
        run: npm run build

  v1-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: v1
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Clerk keys
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not set."
            exit 1
          fi
          if [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "CLERK_SECRET_KEY is not set."
            exit 1
          fi
          if [[ "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" == "pk_test_ci_dummy" ]]; then
            echo "Invalid Clerk publishable key detected."
            exit 1
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-playwright-report
          path: v1/playwright-report
          if-no-files-found: ignore

  # ─── v2 contract jobs ───

  v2-openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Validate v2 OpenAPI contract
        run: node scripts/check-v2-openapi.mjs

  v2-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Validate v2 schema guardrails
        run: node scripts/check-v2-schema.mjs

  v2-monorepo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Validate v2 monorepo scaffold
        run: node scripts/check-v2-monorepo.mjs

  v2-adr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Validate ADR consistency
        run: node scripts/check-v2-adr-consistency.mjs

  # ─── v2 service jobs ───

  v2-go-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/control-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: services/control-api/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  v2-python-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff mypy

      - name: Lint llm-gateway
        run: ruff check services/llm-gateway/src/ services/llm-gateway/tests/

      - name: Lint intelligence-worker
        run: ruff check services/intelligence-worker/src/ services/intelligence-worker/tests/

  v2-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  # ─── dependency review ───

  dependency-review:
    if: ${{ github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true' && vars.DEPENDENCY_REVIEW_SUPPORTED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  # ─── quality gate ───

  quality-gate:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - v1-lint
      - v1-type-check
      - v1-unit-tests
      - v1-migration-check
      - v1-build
      - v1-e2e-smoke
      - v2-openapi
      - v2-schema
      - v2-monorepo
      - v2-go-build
      - v2-python-lint
      - v2-web
      - v2-adr
      - dependency-review
    steps:
      - name: Validate required checks
        env:
          V1_LINT: ${{ needs.v1-lint.result }}
          V1_TYPE_CHECK: ${{ needs.v1-type-check.result }}
          V1_UNIT_TESTS: ${{ needs.v1-unit-tests.result }}
          V1_MIGRATION_CHECK: ${{ needs.v1-migration-check.result }}
          V1_BUILD: ${{ needs.v1-build.result }}
          V1_E2E_SMOKE: ${{ needs.v1-e2e-smoke.result }}
          V2_OPENAPI: ${{ needs.v2-openapi.result }}
          V2_SCHEMA: ${{ needs.v2-schema.result }}
          V2_MONOREPO: ${{ needs.v2-monorepo.result }}
          V2_GO_BUILD: ${{ needs.v2-go-build.result }}
          V2_PYTHON_LINT: ${{ needs.v2-python-lint.result }}
          V2_WEB: ${{ needs.v2-web.result }}
          V2_ADR: ${{ needs.v2-adr.result }}
          ENABLE_DEPENDENCY_REVIEW: ${{ vars.ENABLE_DEPENDENCY_REVIEW }}
          DEPENDENCY_REVIEW_SUPPORTED: ${{ vars.DEPENDENCY_REVIEW_SUPPORTED }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          set -euo pipefail

          core_checks=(
            V1_LINT
            V1_TYPE_CHECK
            V1_UNIT_TESTS
            V1_MIGRATION_CHECK
            V1_BUILD
            V1_E2E_SMOKE
            V2_OPENAPI
            V2_SCHEMA
            V2_MONOREPO
            V2_GO_BUILD
            V2_PYTHON_LINT
            V2_WEB
            V2_ADR
          )

          for check_name in "${core_checks[@]}"; do
            check_result="${!check_name}"
            if [ "$check_result" != "success" ]; then
              echo "Required check failed: ${check_name}=${check_result}"
              exit 1
            fi
          done

          if [ "${ENABLE_DEPENDENCY_REVIEW}" = "true" ] && [ "${DEPENDENCY_REVIEW_SUPPORTED}" = "true" ] && [ "${DEPENDENCY_REVIEW_RESULT}" != "success" ]; then
            echo "Dependency review failed: ${DEPENDENCY_REVIEW_RESULT}"
            exit 1
          fi

          echo "All required CI quality gates passed."
