services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: benevolent_director
      POSTGRES_USER: bd_admin
      POSTGRES_PASSWORD: bd_local_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/control-api/migrations/000001_initial_schema.up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./services/control-api/migrations/000002_repository_intelligence.up.sql:/docker-entrypoint-initdb.d/02_repo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bd_admin -d benevolent_director"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085 || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:
