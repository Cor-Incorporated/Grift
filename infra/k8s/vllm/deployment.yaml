apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen35-9b
  namespace: llm-serving
  labels:
    app.kubernetes.io/name: vllm-qwen35-9b
    app.kubernetes.io/component: llm-serving
    app.kubernetes.io/part-of: grift-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-qwen35-9b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-qwen35-9b
        app.kubernetes.io/component: llm-serving
        app.kubernetes.io/part-of: grift-v2
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.6
          args:
            - "--model"
            - "$(MODEL_NAME)"
            - "--dtype"
            - "$(DTYPE)"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--served-model-name"
            - "$(SERVED_MODEL_NAME)"
            - "--max-num-seqs"
            - "$(MAX_NUM_SEQS)"
          envFrom:
            - configMapRef:
                name: vllm-config
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "4"
            limits:
              nvidia.com/gpu: 1
              memory: "24Gi"
              cpu: "8"
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 30Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
