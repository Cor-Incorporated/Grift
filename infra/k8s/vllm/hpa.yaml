apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-qwen35-9b
  namespace: llm-serving
  labels:
    app.kubernetes.io/name: vllm-qwen35-9b
    app.kubernetes.io/component: llm-serving
    app.kubernetes.io/part-of: grift-v2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-qwen35-9b
  # NOTE: During night shutdown (Cloud Scheduler scales node pool to 0),
  # this pod will enter Pending state until nodes are scaled back up.
  # This is expected behavior — see infra/terraform/modules/gke-gpu/main.tf.
  minReplicas: 1
  maxReplicas: 2
  metrics:
    # Scale on GPU duty cycle via DCGM exporter custom metric.
    # Requires: nvidia-dcgm-exporter + prometheus-adapter or
    # GKE Managed Prometheus with custom metric HPA.
    # Until custom metrics pipeline is configured, HPA stays at
    # minReplicas and serves as a declarative scaling intent.
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "80"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 600
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 900
